<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATÁLOGO DE PRODUCTOS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      padding-bottom: 40px;
    }

    /* Encabezado Principal */
    header {
      background-color: #1e1e1e;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #333;
    }

    header h1 {
      font-size: 1.8rem;
      color: #ffffff;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    /* Barra de Contacto */
    .contacto-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn-contacto {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .whatsapp {
      background-color: #25D366;
      color: white;
    }

    .correo {
      background-color: #ea4335;
      color: white;
    }

    /* Mensaje de Bienvenida */
    .banner-info {
      text-align: center;
      padding: 30px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .banner-info p {
      color: #ccc;
      font-size: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- ENCABEZADO -->
  <header>
    <h1>CATÁLOGO DE PRODUCTOS</h1>
    
    <div class="contacto-bar">
      <a href="https://wa.me/527261161786" target="_blank" class="btn-contacto whatsapp">
        💬 Contactar por WhatsApp
      </a>
      <a href="mailto:solek473music@gmail.com" class="btn-contacto correo">
        ✉️ solek473music@gmail.com
      </a>
    </div>
  </header>

  <!-- INFORMACIÓN PRINCIPAL -->
  <section class="banner-info">
    <p>Bienvenido a nuestro catálogo digital. Revisa nuestros artículos disponibles y ponte en contacto directamente vía WhatsApp o correo electrónico para consultar cotizaciones, disponibilidad o detalles específicos.</p>
  </section>

</body>
</html>
